version: 2

models:
  - name: fct_orders
    description: "Tabela fato de pedidos. Grain: um registro por pedido. Contém revenue calculado, itens e dias para envio."
    columns:
      - name: order_id
        description: "Identificador único do pedido."
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Identificador do cliente. FK para dim_customers."
        tests:
          - not_null
      - name: order_date
        description: "Data em que o pedido foi realizado."
        tests:
          - not_null
      - name: revenue
        description: "Receita total do pedido calculada como sum(unit_price * quantity * (1 - discount))."
      - name: freight
        description: "Custo de frete do pedido."
      - name: days_to_ship
        description: "Dias entre order_date e shipped_date."
      - name: updated_at
        description: "Timestamp da última atualização do registro na source. Usado como controle incremental."

  - name: dim_customers
    description: "Dimensão de clientes. Grain: um registro por cliente. Enriquecida com métricas de comportamento de compra."
    columns:
      - name: customer_id
        description: "Identificador único do cliente."
        tests:
          - not_null
          - unique
      - name: company_name
        description: "Nome da empresa do cliente."
      - name: country
        description: "País do cliente."
      - name: first_order_date
        description: "Data do primeiro pedido do cliente."
      - name: last_order_date
        description: "Data do pedido mais recente do cliente."
      - name: total_orders
        description: "Total de pedidos realizados pelo cliente."

  - name: dim_products
    description: "Dimensão de produtos. Grain: um registro por produto. Enriquecida com categoria e métricas de vendas."
    columns:
      - name: product_id
        description: "Identificador único do produto."
        tests:
          - not_null
          - unique
      - name: product_name
        description: "Nome do produto."
      - name: category_name
        description: "Nome da categoria do produto."
      - name: total_units_sold
        description: "Total de unidades vendidas do produto."
      - name: total_revenue
        description: "Receita total gerada pelo produto."